specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Baker Hughes
providerId: baker-hughes
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Energy Technology
  - Industrial IoT
  - Oil And Gas
  - Rate Limiting
description: Baker Hughes does not publish public rate limits for its Cordant or BHC3 AI Suite APIs.
  Limits, throttling behavior, and burst allowances are negotiated per enterprise contract and documented
  inside the customer's tenant. No numeric values are asserted here.
notes: Reconcile with the contract addendum, customer-portal docs, or integration runbook once an engagement
  is scoped. Do not invent per-second or per-minute numbers.
sources:
  - https://www.bakerhughes.com/cordant
  - https://www.bakerhughes.com/bhc3
responseCodes:
  throttled: 429
limits:
  - name: Per-tenant API throttle
    scope: tenant
    metric: varies
    limit: 'see contract / customer portal documentation'
    notes: Baker Hughes negotiates per-tenant capacity; no public default published.
policies:
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429 responses; honor Retry-After when returned.
  - name: Contract-Defined Capacity
    description: All steady-state and burst capacity is defined in the customer's executed agreement.
  - name: Industrial OT/IT Telemetry
    description: For high-volume telemetry ingest (sensor / historian feeds), Baker Hughes typically provisions
      dedicated ingestion endpoints or message-broker capacity outside the standard request/response API
      ceiling.
maintainers:
