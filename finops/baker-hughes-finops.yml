description: 'FOCUS-aligned FinOps shape for Baker Hughes digital platforms (Cordant, BHC3 AI Suite):
  enterprise license + custom-negotiated. Public meter or rate-card data is not available; this artifact
  describes the dimensions a customer should track inside their own contract.'
notes: No public pricing. Replace meter assumptions with the meters defined in the executed Baker Hughes
  contract once available.
sources:
  - https://www.bakerhughes.com/cordant
  - https://www.bakerhughes.com/bhc3
principles:
  - name: Visibility
    description: Negotiate access to a contract-level usage report from Baker Hughes Digital (assets monitored,
      models scored, telemetry ingested) so consumption can be tracked alongside the fixed license fee.
  - name: Allocation
    description: Tag the platform license to the operations or asset-management business unit that owns
      the production assets being monitored; allocate AI-application costs by use case (predictive maintenance,
      production optimization, etc.).
  - name: Optimization
    description: Right-size the asset-monitoring scope each renewal — only instrument assets where the
      AI model has demonstrated downtime or yield improvement above the per-asset license cost.
  - name: Accountability
    description: Assign a named platform owner inside the asset-management or digital function; review
      contract utilization before each annual true-up.
billingModel:
  pricingCategory: Enterprise License (Custom)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Baker Hughes Digital Platforms
  ServiceCategory: Industrial / Energy Software
  ProviderName: Baker Hughes
  PublisherName: Baker Hughes Company
  InvoiceIssuerName: Baker Hughes Company
  PricingCategory: Enterprise License
  PricingUnit: contract-year
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_license
    description: Annual enterprise platform license (Cordant / BHC3 AI Suite)
    unit: contract-year
    aggregation: sum
    dimensions:
      - tenant
      - product
  - name: monitored_assets
    description: Assets (wells, equipment, plants) under platform monitoring; common contract dimension
    unit: asset
    aggregation: max
    dimensions:
      - asset_class
      - site
  - name: ai_application_seats
    description: BHC3 AI application seats / use-case licenses
    unit: seat
    aggregation: sum
    dimensions:
      - application
      - business_unit
  - name: api_calls
    description: API call volume — tracked for capacity-management, not per-call billed
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tenant
