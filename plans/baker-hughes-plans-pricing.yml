description: Baker Hughes' digital products (Cordant Industrial Platform and BHC3 AI Suite) are sold via
  enterprise contract with custom-negotiated pricing. There is no published self-serve API plan, no public
  rate card, and no consumer-tier pricing — access requires a sales engagement, MSA, and integration
  scoping. Numeric tier limits are not asserted because none are publicly documented.
notes: No public pricing or self-serve API plan published. Cordant and BHC3 AI Suite engagements are
  scoped through Baker Hughes Digital sales. Reconcile with executed contract or partner addendum once
  available. Do not infer per-call or per-asset prices from any third-party source.
sources:
  - https://www.bakerhughes.com/cordant
  - https://www.bakerhughes.com/bhc3
plans:
  - id: baker-hughes-enterprise
    name: Enterprise (Custom-Negotiated)
    type: enterprise
    description: Custom-negotiated commercial agreement covering Cordant and/or BHC3 AI Suite. Pricing,
      data residency, deployment topology (cloud vs on-prem), API quotas, and SLAs are all set per contract.
    entries:
      - label: Platform License
        description: Custom-priced enterprise license covering platform access and named applications
        name: platform_license
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: configurable
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: API Access
        description: API quotas and integration scope set per contract
        name: api_access
        type: quota
        metric: varies
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Baker Hughes Cordant Industrial Platform
      - name: Baker Hughes BHC3 AI Suite
      - name: Custom Data Residency
      - name: Contractual SLAs
      - name: Named Technical Account Management
      - name: Integration Scoping with Baker Hughes Digital
