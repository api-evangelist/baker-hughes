apis:
  - aid: baker-hughes:cordant-platform
    name: Baker Hughes Cordant Industrial Platform
    description: >-
      Cordant is Baker Hughes' modular AI-enabled industrial enterprise software platform for
      asset performance management (APM), process optimization, and emissions management.
      It provides a digital thread across energy and industrial operations, connecting data,
      automating decision-making, and delivering predictive insights. Cordant offers APIs for
      integration with existing enterprise systems including OT/IT connectivity for asset data.
    humanURL: https://www.bakerhughes.com/cordant
    tags:
      - Asset Performance Management
      - Industrial IoT
      - Process Optimization
      - Emissions Management
    properties:
      - type: Documentation
        url: https://www.bakerhughes.com/cordant/platform
      - type: APIReference
        url: https://www.bakerhughes.com/cordant
  - aid: baker-hughes:bhc3-ai-suite
    name: Baker Hughes BHC3 AI Suite
    description: >-
      The BHC3 AI Suite is a joint product from Baker Hughes and C3.ai providing pre-built,
      configurable AI applications for the energy industry. Applications cover predictive
      maintenance, reliability, production optimization, inventory optimization, well placement,
      well integrity, and yield optimization. The platform runs on Microsoft Azure and uses
      C3.ai's model-driven architecture enabling enterprise AI application development.
    humanURL: https://www.bakerhughes.com/bhc3
    tags:
      - Artificial Intelligence
      - Energy
      - Oil And Gas
      - Predictive Maintenance
    properties:
      - type: Documentation
        url: https://www.bakerhughes.com/bhc3
      - type: APIReference
        url: https://www.bakerhughes.com/ai-bakerhughesc3ai/
