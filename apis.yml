name: Baker Hughes
description: >-
  Baker Hughes is an energy technology company providing solutions to energy and industrial
  customers worldwide. Their digital portfolio includes the Cordant industrial software
  platform for asset performance management, process optimization, and emissions management,
  along with the BHC3 AI Suite (in alliance with C3.ai) for enterprise AI applications in oil
  and gas. Baker Hughes operates across oilfield services, industrial equipment, and digital
  solutions segments globally.
